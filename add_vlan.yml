---
- name: Add VLAN 777 to Adtran Switches
  hosts: switches
  gather_facts: no
  
  tasks:
    - name: Configure VLAN 777
      cisco.ios.ios_config:
        lines:
          - no vlan 777
      register: vlan_output

    - name: Display the response from the switch
      debug:
        msg: 
          - "Changes made: {{ vlan_output.updates | default('No changes needed') }}"
          - "Full Response: {{ vlan_output.changed }}"
